<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Open Brain - Options</title>
  <style>
    body {
      font-family: 'Google Sans', system-ui, -apple-system, sans-serif;
      padding: 20px;
      min-width: 360px;
      color: #1f1f1f;
      font-size: 14px;
    }
    h2 { margin-top: 0; font-size: 18px; }
    label { display: block; font-weight: 500; margin: 12px 0 4px; font-size: 13px; color: #5f6368; }
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #1a73e8; }
    button {
      margin-top: 16px;
      padding: 8px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #1557b0; }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #137333;
    }
    .hint {
      font-size: 12px;
      color: #80868b;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h2>🧠 Open Brain Settings</h2>

  <label>API URL</label>
  <input type="url" id="apiUrl" placeholder="https://..." />
  <div class="hint">Supabase edge function URL</div>

  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="Your API key" />
  <div class="hint">Used as Bearer token in Authorization header</div>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
